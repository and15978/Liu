name: Daily TWSE Fetch

on:
  schedule:
    # GitHub Actions scheduled workflows may be delayed or even skipped
    # during periods of high platform load, so we schedule multiple
    # fallback times throughout the evening. As long as one of them
    # fires successfully and TWSE has published the day's data by then,
    # the fetch will succeed.
    # (cron times are in UTC; Taipei time = UTC + 8)
    - cron: '30 6 * * 1-5'   # Taipei 14:30 (1 hour after market close, first attempt)
    - cron: '0 9 * * 1-5'    # Taipei 17:00 (fallback)
    - cron: '0 12 * * 1-5'   # Taipei 20:00 (fallback)
    - cron: '30 15 * * 1-5'  # Taipei 23:30 (fallback, gives TWSE the most buffer time)
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to backfill, format YYYYMMDD (e.g. 20260623). Leave blank to fetch the latest available data.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch TWSE data
        run: python3 fetch_twse.py "${{ github.event.inputs.date }}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Auto update TWSE data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
